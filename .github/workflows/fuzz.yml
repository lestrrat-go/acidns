name: Fuzz

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./wire, name: FuzzUnmarshal }
          - { pkg: ./wire/wirebb, name: FuzzDecodeWire }
          - { pkg: ./wire/rdata, name: FuzzUnpackTyped }
          - { pkg: ./internal/streamframe, name: FuzzReadFrame }
          - { pkg: ./zonefile, name: FuzzParse }
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run ${{ matrix.target.name }} (${{ matrix.target.pkg }})
        run: |
          go test ${{ matrix.target.pkg }} \
            -run '^$' -fuzz '^${{ matrix.target.name }}$' \
            -fuzztime 60s
