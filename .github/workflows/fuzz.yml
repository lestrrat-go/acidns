name: Fuzz

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./wire, name: FuzzUnpack }
          - { pkg: ./wire/wirebb, name: FuzzDecodeWire }
          - { pkg: ./wire/rdata, name: FuzzUnpackTyped }
          - { pkg: ./internal/streamframe, name: FuzzReadFrame }
          - { pkg: ./zonefile, name: FuzzParse }
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run ${{ matrix.target.name }} (${{ matrix.target.pkg }})
        run: |
          go test ${{ matrix.target.pkg }} \
            -run '^$' -fuzz '^${{ matrix.target.name }}$' \
            -fuzztime 60s

      # Stage every corpus we can reach so a fuzz failure (assertion or
      # timeout) leaves an actionable artifact. Two paths matter:
      #   - $pkg/testdata/fuzz/$name — Go writes a file here only on
      #     assertion-style failures, so it's empty after a timeout.
      #   - $GOCACHE/fuzz/<import>/$name — the live runtime corpus,
      #     including the slow input the worker was still chewing when
      #     the deadline hit.
      - name: Stage fuzz corpus
        if: failure()
        run: |
          module=$(go list -m)
          pkg="${{ matrix.target.pkg }}"
          import="${module}/${pkg#./}"
          import="${import%/}"
          name="${{ matrix.target.name }}"
          gocache=$(go env GOCACHE)
          staging="$RUNNER_TEMP/fuzz-corpus"
          mkdir -p "$staging/testdata" "$staging/runtime"
          if [ -d "$pkg/testdata/fuzz/$name" ]; then
            cp -a "$pkg/testdata/fuzz/$name/." "$staging/testdata/" || true
          fi
          if [ -d "$gocache/fuzz/$import/$name" ]; then
            cp -a "$gocache/fuzz/$import/$name/." "$staging/runtime/" || true
          fi
          ls -laR "$staging" || true

      - name: Upload fuzz corpus
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fuzz-corpus-${{ matrix.target.name }}
          path: ${{ runner.temp }}/fuzz-corpus/
          if-no-files-found: ignore
