name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./wire, name: FuzzUnpack }
          - { pkg: ./wire/wirebb, name: FuzzDecodeWire }
          - { pkg: ./zonefile, name: FuzzParse }
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cache dependencies
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run ${{ matrix.target.name }} (${{ matrix.target.pkg }})
        run: |
          go test ${{ matrix.target.pkg }} \
            -run '^$' -fuzz '^${{ matrix.target.name }}$' \
            -fuzztime 30m

      - name: Upload corpus on crash
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: fuzz-corpus-${{ matrix.target.name }}
          path: ${{ matrix.target.pkg }}/testdata/fuzz/${{ matrix.target.name }}/
          if-no-files-found: ignore
