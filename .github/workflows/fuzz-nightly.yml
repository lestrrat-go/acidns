name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./wire, name: FuzzUnpack }
          - { pkg: ./wire/wirebb, name: FuzzDecodeWire }
          - { pkg: ./zonefile, name: FuzzParse }
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run ${{ matrix.target.name }} (${{ matrix.target.pkg }})
        run: |
          go test ${{ matrix.target.pkg }} \
            -run '^$' -fuzz '^${{ matrix.target.name }}$' \
            -fuzztime 30m

      - name: Upload corpus on crash
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.target.name }}
          path: ${{ matrix.target.pkg }}/testdata/fuzz/${{ matrix.target.name }}/
          if-no-files-found: ignore
