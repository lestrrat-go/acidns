name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { pkg: ./wire, name: FuzzUnpack }
          - { pkg: ./wire/wirebb, name: FuzzDecodeWire }
          - { pkg: ./zonefile, name: FuzzParse }
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cache dependencies
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Run ${{ matrix.target.name }} (${{ matrix.target.pkg }})
        run: |
          go test ${{ matrix.target.pkg }} \
            -run '^$' -fuzz '^${{ matrix.target.name }}$' \
            -fuzztime 30m

      - name: Upload corpus on crash
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-corpus-${{ matrix.target.name }}
          path: ${{ matrix.target.pkg }}/testdata/fuzz/${{ matrix.target.name }}/
          if-no-files-found: ignore
