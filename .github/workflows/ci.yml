name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Download dependencies
        run: go mod download

      - name: Tidy dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run tests with race detector and coverage
        run: |
          go test -race -timeout 10m -coverprofile=coverage.out ./...

      - name: Build commands
        run: |
          go build ./cmd/...

      - name: Coverage report
        if: always()
        run: |
          if [ -f coverage.out ]; then
            {
              echo "## Coverage"
              echo
              echo '| Package | Coverage | Covered/Total |'
              echo '|---------|---------:|--------------:|'
              awk '
                NR == 1 { next }
                {
                  key = $1
                  if (!(key in stmts)) {
                    stmts[key] = $2
                    n = index($1, ".go:")
                    pkg = substr($1, 1, n + 1)
                    sub(/\/[^\/]+$/, "", pkg)
                    sub(/^github\.com\/lestrrat-go\/acidns\/?/, "", pkg)
                    if (pkg == "") pkg = "(root)"
                    pkgof[key] = pkg
                  }
                  if ($3 > 0) hit[key] = 1
                }
                END {
                  for (k in stmts) {
                    p = pkgof[k]
                    total[p] += stmts[k]
                    gt += stmts[k]
                    if (k in hit) {
                      covered[p] += stmts[k]
                      gc += stmts[k]
                    }
                  }
                  n = 0
                  for (p in total) keys[++n] = p
                  for (i = 1; i <= n; i++)
                    for (j = i + 1; j <= n; j++)
                      if (keys[j] < keys[i]) { t = keys[i]; keys[i] = keys[j]; keys[j] = t }
                  for (i = 1; i <= n; i++) {
                    p = keys[i]
                    printf "| %s | %.1f%% | %d/%d |\n", p, 100 * covered[p] / total[p], covered[p], total[p]
                  }
                  if (gt > 0) printf "| **TOTAL** | **%.1f%%** | **%d/%d** |\n", 100 * gc / gt, gc, gt
                }
              ' coverage.out
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check for uncommitted changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Uncommitted changes detected:"
            git status --porcelain
            exit 1
          fi
